# Wait for an incoming CometChat call, accept it, screenshot. Generic across use cases — the
# CometChat kit's Accept/Decline widget is stack-independent. Param: -e APP_ID=...
appId: ${APP_ID}
---
- extendedWaitUntil:
    visible: "Accept"
    timeout: 45000
- takeScreenshot: /tmp/mobile-incoming
- tapOn: "Accept"
- waitForAnimationToEnd: { timeout: 8000 }
- takeScreenshot: /tmp/mobile-ongoing
